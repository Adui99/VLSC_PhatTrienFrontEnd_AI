<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colspan & rowspan HTML</title>
</head>

<body>
    <h1>Tạo bảng thông tin học sinh có colspan và rowspan</h1>
    <table border="2">
        <tr>
            <th>STT</th>
            <th>Họ tên</th>
            <th>Môn học</th>
            <th>Điểm</th>
        </tr>
        <tr>
            <td rowspan="2" align="center">1</td>
            <td rowspan="2">Nguyễn Ngọc Tiến</td>
            <td>Toán</td>
            <td>9</td>
        </tr>
        <tr>
            <td>Văn</td>
            <td>8</td>
        </tr>
        <tr>
            <td align="center">2</td>
            <td>Đỗ Minh Khoa</td>
            <td>Lý</td>
            <td>10</td>
        </tr>
        <tr>
            <td align="center">3</td>
            <td>Hoàng Khương Duy</td>
            <td>Tiếng Anh</td>
            <td>9.5</td>
        </tr>
        <tr>
            <td colspan="4">GHI CHÚ: </td>
        </tr>
    </table>
</body>

</html>
