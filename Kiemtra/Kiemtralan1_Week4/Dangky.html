<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form dang ky</title>
</head>

<body>

    <table>
        <tr>
            <td><label for="fname">Enter name</label>:</label></td>
            <td><input type="text" id="fname" placeholder="Nhap ho ten"></td>
        </tr>
        <tr>
            <td><label for="passs">Enter passsword:</label></td>
            <td><input type="text" id="pass"></td>
        </tr>
        <tr>
            <td><label for="email">Enter Email:</label></td>
            <td><input type="text" id="email"></td>
        </tr>
        <tr>

                    <option>India</option>
                    <option>China</option>
                    <option>Japan</option>
                    <option>USA</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><input type="submit" value="register"></td>
        </tr>
    </table>

</body>

</html>
