<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<style>
    body {
        font-family: sans-serif;
        font-size: 20px;
    }

    .card {
        width: 500px;
        margin: 50px auto;
        padding: 5px;
        border: 4px;
        border-radius: 20px;
        background-color: lightblue;
    }

    .avatar img {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        margin: 10px 10px 10px 75px;
    }

    .name {
        color: black;
        font-weight: 700;
        font-size: 25px;
    }

    .job {
        color: green;
    }

    .bio {}

    .skill {
        list-style: none;
        display: inline-block;
        font-size: 20px;
        padding: 10px;
    }

    .skill1 {
        background-color: aqua;
        padding: 10px;
        border-radius: 10px;
        margin: 2px;
    }

    .skill2 {
        background-color: #0ed31e;
        padding: 10px;
        border-radius: 10px;
        margin: 2px;
    }

    .skill3 {
        background-color: #bec926;
        padding: 10px;
        border-radius: 10px;
        margin: 2px;
    }

    .contact {
        display: inline-block;
        text-decoration: name;
        border: 2px solid #e01f70;
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 700;
        color: #e01f70;
        margin: 0px 0px 0px 20px;
        transition: ease 0.2s;
    }

    .contact:hover {
        color: #e01f70;
        background: #000;
    }
</style>

<body>
    <div class="card">
        <div class="avatar">
            <a href=""><img
                    src="https://png.pngtree.com/png-vector/20191101/ourmid/pngtree-cartoon-color-simple-male-avatar-png-image_1934459.jpg"
                    alt="">
            </a>
            <h2 class="name">Hoang Khuong Duy</h2>
        </div>
        <div>
            <p class="info job">Student</p>
            <p class="info bio">Xin chao! Toi la Duy den tu VLSC. Rat vui duoc gap cac ban</p>
            <p class="info skill">Ky nang</p>
            <ul>
                <li class="skill skill1">Ngoai ngu</li>
                <li class="skill skill2">Giao tiep</li>
                <li class="skill skill3">Quan ly</li>
            </ul>
        </div>
        <div>
            <a class="contact" href="https://www.google.com">LIEN HE</a>
        </div>
    </div>

</body>

</html>
