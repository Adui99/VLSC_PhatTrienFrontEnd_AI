<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO CSS</title>
    <style>
        body {
            font-family: sans-serif;
            font-size: 20px;
        }

        h2 {
            color: blue;
        }

        a {
            display: inline-block;
            text-decoration: name;
            border: 2px solid #e01f70;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            color: #e01f70;
            margin: 20px 0px;
            transition: ease 0.2s;
        }

        a:hover {
            color: #e01f70;
            background: #000;
        }

        p {
            color: yellow;
            /*khong nghe*/
        }

        #notice {
            color: red;
        }

        text {
            color: greenyellow;
        }

        .des {
            color: brown;
            font-size: 16px;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Tham gia cong dong hoc vien VLSC tren Facebook</h2>
    <p id="notice">Day la nhung noi dung quan trong danh cho nguoi moi bat dau</p>
    <p class="text des">
        Tham gia cong dong hoc vien VLSC tren Facebook de nhan duoc thong bao ve lich hoc,
        tai lieu, va giao luu cung cac hoc vien khac.
    </p>
    <i style="color: green;">Day la thong tin quan trong</i><br>
    <a href="http://www.Facebook.com/itvlu">JOIN GROUP</a>
</body>

</html>
